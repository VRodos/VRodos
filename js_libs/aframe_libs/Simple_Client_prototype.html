<!DOCTYPE html>
<html lang="en" data-theme="emerald">
<head>
    <meta charset="utf-8">
    <title>Take part</title>
    <meta name="description" content="Take part">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <script src="AFRAME_RUNTIME_URL_PLACEHOLDER"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.umd.js"></script>
    <script src="https://unpkg.com/lucide@0.469.0"></script>

    <script src="../easyrtc/easyrtc.js"></script>
    <script src="../dist/networked-aframe.js"></script>
    <script src="../js/NoSleep.min.js"></script>
    <link rel="stylesheet" type="text/css" href="css/adv-screen.css" />
    <link rel="stylesheet" type="text/css" href="VRODOS_PLUGIN_URL_PLACEHOLDERcss/vrodos_modern_compiled.css" />
</head>

<body id="simple-client-body" class="vrodos-manager-wrapper tw-min-h-screen tw-bg-slate-50 tw-text-slate-900 tw-antialiased">

<div id="renderFeedback" class="renderFeedback tw-grid tw-place-items-center tw-bg-[radial-gradient(circle_at_top,_rgba(16,185,129,0.08),_rgba(248,250,252,0.96)_48%,_rgba(241,245,249,1)_100%)]">
    <div class="renderFeedbackText tw-rounded-[2rem] tw-border-2 tw-border-white tw-bg-white/80 tw-px-8 tw-py-6 tw-text-center tw-text-lg tw-font-bold tw-text-slate-800 tw-shadow-[0_20px_50px_rgba(0,0,0,0.05)] tw-backdrop-blur-xl tw-animate-pulse" id="renderFeedbackText">
        <div class="tw-flex tw-flex-col tw-items-center tw-gap-4">
            <div class="tw-w-12 tw-h-12 tw-border-4 tw-border-emerald-500 tw-border-t-transparent tw-rounded-full tw-animate-spin"></div>
            <span>Waiting for the rendered scene ...</span>
        </div>
    </div>
</div>

<div class="actionsActor tw-fixed tw-right-4 tw-top-4 tw-bottom-auto tw-z-[1000] tw-flex tw-w-[min(22rem,calc(100vw-2rem))] tw-flex-col tw-gap-3 tw-rounded-[1.75rem] tw-border tw-border-slate-200 tw-bg-white/90 tw-p-4 tw-text-slate-900 tw-shadow-[0_28px_70px_rgba(0,0,0,0.08)] tw-backdrop-blur-xl" name="actionsDiv" id="actionsDiv">
    <div class="tw-flex tw-items-center tw-gap-2 tw-mb-1">
        <div class="tw-w-2 tw-h-2 tw-bg-emerald-500 tw-rounded-full tw-animate-pulse"></div>
        <span class="tw-text-[10px] tw-font-black tw-uppercase tw-tracking-widest tw-text-emerald-700">Live Status</span>
    </div>
    <div id="reporting" class="tw-rounded-2xl tw-bg-slate-50 tw-px-4 tw-py-3 tw-text-left tw-text-sm tw-font-medium tw-leading-5 tw-text-slate-600 tw-border tw-border-slate-100"></div>
</div>

<!--
    ENABLED CAMERA & MIC
    video: true; audio: true;
    Make sure your browser allows permissions!
-->
<a-scene
        id="aframe-scene-container"
        fog="AFRAME_FOG_PLACEHOLDER"
        background="color: AFRAME_CLEARCOLOR_PLACEHOLDER"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        networked-scene="
        app: appname;
        room: roomname;
        debug: false;
        adapter: easyrtc;
        audio: true;
        video: true;
        connectOnLoad: false;
        serverURL: /;
    ">

    <a-assets>
        <!-- Avatar Template -->
        <template id="avatar-template">
            <a-entity class="avatar"
                      networked-audio-source>

                <!-- This plane shows the video stream -->
                <a-plane id="videoPlane"
                         color="#FFF"
                         width="1"
                         height="0.75"
                         position="0 0.6 0.5" material="side: double"
                         networked-video-source="streamName:video">
                </a-plane>

                <a-plane id="screenPlane"
                         color="#FFF"
                         width="8"
                         height="6"
                         position="0 0.6 0" material="side: double; shader:flat"
                         networked-video-source="streamName:screen">
                </a-plane>

            </a-entity>
        </template>
    </a-assets>


    <!-- Local Player -->
    <!-- attachTemplateToLocal:false means you won't see your own face on screen, which is normal -->
    <a-entity id="player"
              networked="template:#avatar-template;attachTemplateToLocal:false;"
              position="0 0 0"
              wasd-controls="fly:true"
              look-controls>

        <a-entity
                active="true"
                camera="near: 0.1; far: 7000.0;"
                position="0 0 0">
        </a-entity>

    </a-entity>

    <!-- Fixed Light -->
    <a-entity
            light="color: #ffaaff; intensity: 1.5"
            position="5 5 5">
    </a-entity>

</a-scene>

<script>
    /* Syncing avatar */
    NAF.schemas.add({
        template: '#avatar-template',
        components: [
            'position',
            'rotation'
        ]
    });

    document.body.addEventListener('connected', onConnect);

    /* Called by Networked-Aframe when connected to server */
    function onConnect () {
        console.log("Connected to NAF Server");

        // Attempt to get user name
        let userName = "User";
        if(window.NAF.entities && window.NAF.entities.entities) {
            userName = Object.keys(window.NAF.entities.entities)[0] || "User";
        }
        let room = window.NAF.room;

        function selectString(room, userName, lang, key, position){
            let str = "Error unknown string";
            switch (key) {
                case "_connected":
                    str = "You are now connected to server at room: " + room;
                    break;
                case "_selectPosition":
                    str = "Select a position in the scene: ";
                    break;
                case "_position":
                    str = "Position: " + position;
                    break;
            }
            return userName + ", " + str;
        }

        let userLang = navigator.language.substring(0,2);
        let reportingEl = document.getElementById("reporting");

        if(reportingEl) {
            reportingEl.innerText = selectString(room, userName, userLang, "_connected");
            setTimeout(function (){
                reportingEl.innerText = selectString(room, userName, userLang, "_selectPosition");
            }, 5000);
        }

        // Hide 3D scene canvas
        let scene = document.getElementsByTagName('a-scene')[0];
        if(scene) scene.style.display='none';
    }

    // Add to a div the input stream of the rendered screen
    function scanForStreamsAndShowInFullScreen(){
        if(!window.NAF || !window.NAF.entities) return;

        for (let e in window.NAF.entities.entities) {
            let entity = window.NAF.entities.entities[e];
            if(!entity.children) continue;

            for (let i=0; i < entity.children.length; i++) {
                let child = entity.children[i];
                if(child.components && child.components['networked-video-source']){
                    let nvs = child.components['networked-video-source'];

                    if(nvs !== undefined){
                        if(nvs.videoTexture !== undefined && nvs.videoTexture !== null) {
                            if (nvs.el.id === 'screenPlane'){
                                let feedbackDiv = document.getElementById("renderFeedback");
                                if(feedbackDiv && feedbackDiv.children.length === 1) {
                                    feedbackDiv.appendChild(nvs.videoTexture.image);
                                    let img = feedbackDiv.children[1];
                                    img.style.position="absolute";
                                    img.style.left="0";
                                    img.style.width = "100%";
                                    img.className = "tw-h-full tw-w-full tw-object-contain";
                                    document.getElementById("renderFeedbackText").style.visibility = "hidden";
                                    clearInterval(timerForScreenFeedback); // Stop polling once stream is connected
                                }
                            }
                        }
                    }
                }
            }
        }
    }

    let timerForScreenFeedback = setInterval(scanForStreamsAndShowInFullScreen, 3000);

    function actorMediaSupported() {
        return !!(
            navigator.mediaDevices &&
            typeof navigator.mediaDevices.getUserMedia === 'function'
        );
    }

    function showActorMediaRequirements() {
        let feedbackText = document.getElementById("renderFeedbackText");
        let reportingEl = document.getElementById("reporting");
        let isSecureLocalOrigin = window.isSecureContext ||
            window.location.hostname === 'localhost' ||
            window.location.hostname === '127.0.0.1';

        if (feedbackText) {
            feedbackText.classList.remove('tw-animate-pulse');
            feedbackText.innerHTML =
                '<div class="tw-flex tw-max-w-md tw-flex-col tw-items-center tw-gap-4">' +
                '<div class="tw-flex tw-h-14 tw-w-14 tw-items-center tw-justify-center tw-rounded-full tw-bg-amber-100 tw-text-amber-600">' +
                '<i data-lucide="triangle-alert" class="tw-h-7 tw-w-7"></i>' +
                '</div>' +
                '<div class="tw-text-xl tw-font-black tw-text-slate-900">Camera and microphone are unavailable</div>' +
                '<p class="tw-text-sm tw-font-medium tw-leading-6 tw-text-slate-600">' +
                (isSecureLocalOrigin
                    ? 'This browser is not exposing media capture to the actor client. Check camera and microphone permissions, then reload the page.'
                    : 'Open this actor link over HTTPS or localhost, then allow camera and microphone access.') +
                '</p>' +
                '</div>';
        }

        if (reportingEl) {
            reportingEl.classList.add('tw-border', 'tw-border-amber-200', 'tw-bg-amber-50', 'tw-text-amber-900');
            reportingEl.innerHTML = isSecureLocalOrigin
                ? 'Camera or microphone access is blocked in this browser. Check site permissions and reload.'
                : 'Camera and microphone require HTTPS or localhost. Current origin: ' + window.location.origin;
        }

        if (typeof window.lucide !== 'undefined' && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons();
        }
    }

    function startActorConnection() {
        let scene = document.getElementById('aframe-scene-container');
        if (!scene) {
            return;
        }

        if (!actorMediaSupported()) {
            showActorMediaRequirements();
            return;
        }

        if (scene.hasLoaded) {
            scene.emit('connect', null, false);
            return;
        }

        scene.addEventListener('loaded', function handleSceneLoaded() {
            scene.removeEventListener('loaded', handleSceneLoaded);
            scene.emit('connect', null, false);
        });
    }

    // Initialize NoSleep
    let noSleep = new NoSleep();

    function go_full_screen(){
        // Enable NoSleep on user click
        noSleep.enable();

        var elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        } else if (elem.mozRequestFullScreen) {
            elem.mozRequestFullScreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        }
        document.getElementById("view-fullscreen").style.display = "none";
    }

    document.addEventListener('DOMContentLoaded', function () {
        if (typeof window.lucide !== 'undefined' && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons();
        }
        startActorConnection();
    });

</script>

<button id="view-fullscreen" class="tw-btn tw-btn-primary tw-fixed tw-right-4 tw-bottom-4 tw-z-[10000000] tw-rounded-2xl tw-border-0 tw-px-6 tw-text-white tw-shadow-[0_15px_35px_rgba(16,185,129,0.25)] hover:tw-shadow-[0_20px_45px_rgba(16,185,129,0.35)] tw-transition-all"
        onClick="go_full_screen();">
    <i data-lucide="maximize" class="tw-h-4 tw-w-4"></i>
    <span>Enter Fullscreen</span>
</button>

</body>
</html>
